name: command_line
on:
  push:
    branches: ['*']

jobs:
  tests:
    strategy:
      matrix:
        python: [3.11]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install cowsay
        run: |
          python -m pip install -U pip
          python -m pip install .

      - name: Run tests
        run: |
          cowsay 'moo'
